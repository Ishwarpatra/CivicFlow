<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicFlow: The Intelligent Indian Election Navigator</title>
    <!-- HTMX for AJAX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js for UI reactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-[#F8F7F3] text-[#1A1A1A] font-sans antialiased flex flex-col items-center justify-center min-h-screen">

<main x-data="{ status: 0 }" class="w-full max-w-4xl h-screen sm:h-[calc(100vh-2rem)] sm:my-4 flex flex-col bg-white sm:border-8 border-[#1A1A1A] shadow-[8px_8px_0px_#1A1A1A] overflow-hidden relative">

    <!-- Header -->
    <header class="h-20 border-b-2 border-[#1A1A1A] flex items-center px-4 sm:px-8 justify-between bg-white shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF9933] flex items-center justify-center font-bold text-white text-xl border-2 border-[#1A1A1A] shadow-[2px_2px_0px_#1A1A1A]">CF</div>
            <h1 class="text-xl sm:text-2xl font-black tracking-tighter uppercase italic">CivicFlow</h1>
        </div>
         <div class="flex items-center gap-4 sm:gap-6">
             <div class="hidden sm:flex items-center gap-2">
                 <label for="locale" class="text-xs font-bold uppercase">Lang:</label>
                 <select id="locale" name="locale" x-model="locale" class="border-2 border-[#1A1A1A] p-1 text-xs font-bold uppercase focus:outline-none">
                     <option value="en">ENG</option>
                     <option value="hi">HIN</option>
                 </select>
             </div>
             <div class="w-px h-8 bg-[#1A1A1A] opacity-20 hidden sm:block"></div>
             <div x-data="{ user: null, open: false }" @auth-changed.window="user = $event.detail; status = 1" class="relative">
                 <template x-if="user">
                     <div>
                         <button @click="open = !open" class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#1A1A1A] flex items-center justify-center text-sm font-bold text-white shadow-[2px_2px_0px_#FF9933] cursor-pointer" x-text="user.email.charAt(0).toUpperCase()"></button>
                         <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] p-2 z-50 flex flex-col gap-2">
                             <div class="text-xs opacity-70 p-2 truncate" x-text="user.email"></div>
                             <button @click="user = null; open = false;" class="w-full text-left px-2 py-2 text-xs font-bold uppercase hover:bg-[#F0F0F0] text-[#1A1A1A] hover:text-[#ea4335] transition-colors border-t border-[#1A1A1A]">Logout</button>
                         </div>
                     </div>
                 </template>
                 <template x-if="!user">
                    <button type="button" @click="document.dispatchEvent(new CustomEvent('auth-changed', { detail: { email: 'voter@example.com' } }));" class="px-4 sm:px-6 py-2 bg-[#1A1A1A] text-white text-[10px] sm:text-xs font-bold uppercase tracking-widest hover:bg-[#FF9933] transition-colors border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] active:translate-y-[4px] active:shadow-none transition-all">Log In</button>
                 </template>
             </div>
         </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full lg:w-3/4 mx-auto">
        <div class="flex-1 flex flex-col h-full bg-white relative border-l-2 border-r-2 border-[#1A1A1A]">
            <!-- Chat Interface -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6" aria-live="polite" x-data="{ locale: 'en' }">
                <!-- Initial Welcome Message -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 bg-[#1A1A1A] text-white flex items-center justify-center text-xs font-bold shrink-0 border border-[#1A1A1A]">AI</div>
                    <div class="p-4 bg-[#F0F0F0] text-[#1A1A1A] text-sm leading-relaxed max-w-[85%] sm:max-w-[80%] border border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A]">
                        Namaskar! I'm your CivicFlow Navigator. I can help you check your voting eligibility, find your polling booth, or know your representative. What would you like to do?
                    </div>
                </div>
            </div>

            <!-- Loading Indicator with Gemini Sparkle and Civic Pulse Skeleton -->
            <div id="loading-indicator" class="htmx-indicator absolute bottom-[180px] left-4 sm:left-8 flex gap-4 w-[80%] z-20" aria-live="polite">
                <!-- Gemini Sparkle Core -->
                <div class="w-12 h-12 rounded-xl gemini-sparkle flex items-center justify-center shrink-0 border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A]">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                
                <!-- Civic Pulse Skeleton -->
                <div class="flex-1 bg-white p-3 border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] flex flex-col justify-center gap-2">
                    <span class="uppercase tracking-widest font-bold text-[9px] text-[#4285f4]">Synthesizing with Vertex AI...</span>
                    <div class="w-full h-3 rounded-sm civic-skeleton border border-gray-200"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 sm:p-6 bg-white border-t-2 border-[#1A1A1A] z-10 shrink-0">
                <form hx-post="/api/chat" hx-target="#chat-container" hx-swap="beforeend" hx-indicator="#loading-indicator" class="flex items-center gap-2 sm:gap-3" x-data="{ message: '', isPending: false }" @submit="if(!message.trim()) { $event.preventDefault(); return; }; isPending = true;" @gps-start.window="isPending = true" @gps-end.window="isPending = false" @chat-success.window="message = ''; isPending = false; $refs.chatInput.focus();" @chat-error.window="isPending = false;">
                     <input type="hidden" name="lang" :value="locale">
                     <button type="button" @click="$dispatch('request-location')" :disabled="isPending" class="w-12 h-12 flex items-center justify-center border-2 border-[#1A1A1A] text-[#1A1A1A] hover:bg-[#FF9933] hover:text-white transition-colors bg-[#F8F7F3] shadow-[4px_4px_0px_#1A1A1A] disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] shrink-0 active:translate-y-[4px] active:shadow-none transition-all hidden sm:flex" aria-label="Share Location">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <input autofocus x-ref="chatInput" type="text" name="message" x-model="message" required maxlength="500" :disabled="isPending" class="flex-1 bg-white border-2 border-[#1A1A1A] px-4 py-3 text-sm focus:outline-none focus:bg-[#F8F7F3] disabled:opacity-50 transition shadow-[4px_4px_0px_#1A1A1A] rounded-none italic placeholder:not-italic min-w-0" placeholder="Ask about eligibility..." autocomplete="off">
                    <button type="submit" class="w-12 h-12 bg-[#1A1A1A] text-white flex items-center justify-center border-2 border-[#1A1A1A] hover:bg-[#FF9933] transition-colors shadow-[4px_4px_0px_rgba(26,26,26,0.2)] hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] shrink-0 disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-[4px] active:shadow-none transition-all" :disabled="!message.trim() || isPending" aria-label="Send Message">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                    <!-- Cancel Button when pending -->
                    <button type="button" x-show="isPending" @click="$dispatch('chat-error'); document.getElementById('acquire-loader')?.remove(); document.getElementById('loading-indicator').classList.remove('htmx-request');" class="w-12 h-12 bg-[#ea4335] text-white flex items-center justify-center border-2 border-[#1A1A1A] hover:bg-[#c5221f] transition-colors shadow-[4px_4px_0px_rgba(26,26,26,0.2)] hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] shrink-0 active:translate-y-[4px] active:shadow-none transition-all" aria-label="Cancel">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                    </button>
                </form>
            <!-- Suggestion Chips -->
            <div class="flex flex-wrap gap-x-2 gap-y-2 mt-4 sm:mt-6" x-data>
                <button @click="document.querySelector('input[name=\'message\']').value = 'Am I eligible to vote?'; document.querySelector('form').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}));" class="m3-button">Check Eligibility</button>
                <button @click="document.querySelector('input[name=\'message\']').value = 'Find my polling booth'; document.querySelector('form').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}));" class="m3-button-primary">Find Polling Booth</button>
                <button @click="document.querySelector('input[name=\'message\']').value = 'KNOW_REP'; document.querySelector('form').dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}));" class="m3-button-secondary">Know Your Rep</button>
            </div>
            </div>
        </div>
    </div>
</main>

<script>
    // Location handling for Alpine
    document.addEventListener('request-location', () => {
         if ("geolocation" in navigator) {
             document.dispatchEvent(new CustomEvent('gps-start'));
            // Add a temporary message to UI
            const chatBox = document.getElementById('chat-container');
            chatBox.insertAdjacentHTML('beforeend', '<div id="acquire-loader" class="text-center text-xs font-bold uppercase tracking-widest text-[#1A1A1A] my-4 py-3 px-6 border-2 border-[#1A1A1A] bg-white shadow-[4px_4px_0px_#FF9933] block w-[fit-content] mx-auto mt-6 mb-2 flex items-center gap-3"><svg class="w-4 h-4 animate-[spin_2s_linear_infinite] text-[#FF9933]" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span>Acquiring GPS Signal...</span></div>');
            
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                // Send hidden form submission to HTMX backend with location
                const formData = new FormData();
                formData.append('message', `FIND_BOOTH_LOCATION|${lat}|${lng}`);
                const locale = document.getElementById('locale').value || 'en';
                
                fetch(`/api/chat?lang=${locale}`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(html => {
                    document.getElementById('acquire-loader')?.remove();
                    chatBox.insertAdjacentHTML('beforeend', html);
                    document.dispatchEvent(new CustomEvent('gps-end'));
                });

            }, (error) => {
                 document.getElementById('acquire-loader')?.remove();
                 chatBox.insertAdjacentHTML('beforeend', `
                    <div x-data="{ show: false }" x-init="setTimeout(() => show = true, 50)" :class="show ? 'chat-bubble-entered' : 'chat-bubble-enter'" class="spring-m3 flex gap-4 mb-6 relative">
                        <div class="w-8 h-8 bg-[#ea4335] text-white flex items-center justify-center text-xs font-bold shrink-0 border border-[#1A1A1A]">ERR</div>
                        <div class="p-4 bg-[#F8F7F3] text-[#ea4335] text-sm leading-relaxed max-w-[85%] sm:max-w-[80%] border border-[#ea4335] shadow-[4px_4px_0px_#ea4335] flex flex-col gap-2">
                             <p class="font-bold uppercase tracking-widest text-xs mb-2 text-[#1A1A1A]">Location Access Denied or Timeout</p>
                             <p>Unable to retrieve coordinates. Please enable site permissions.</p>
                        </div>
                    </div>
                `);
                 document.dispatchEvent(new CustomEvent('gps-end'));
            }, { timeout: 10000 });
        } else {
             document.dispatchEvent(new CustomEvent('gps-end'));
        }
    });

    // Handle HTMX successful swap and clear message
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if(evt.detail.target.id === 'chat-container') {
             if (evt.detail.successful) {
                 document.dispatchEvent(new CustomEvent('chat-success'));
             } else {
                 document.dispatchEvent(new CustomEvent('chat-error'));
             }
        }
    });

    <!-- Use MutationObserver for auto-scrolling reliably without setTimeout -->
    const chatContainer = document.getElementById('chat-container');
    if (chatContainer) {
        const observer = new MutationObserver(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
        observer.observe(chatContainer, { childList: true });
    }
</script>

</body>
</html>
