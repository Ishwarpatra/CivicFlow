<!DOCTYPE html>
<html x-data :lang="$store.app ? $store.app.locale : 'en'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicFlow | Intelligent Indian Election Navigator</title>
    <!-- Google Analytics 4 (Google Services Integration) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
      // Track civic action events
      function trackCivicEvent(action) { gtag('event', action, { event_category: 'civic_engagement' }); }
    </script>
    <!-- Google Maps JavaScript API (loaded dynamically when booth lookup is triggered) -->
    <script>
      window.__mapsApiKey = '';
      function loadGoogleMaps(key) {
        if (key && !document.getElementById('gmap-script')) {
          const s = document.createElement('script');
          s.id = 'gmap-script';
          s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
          s.async = true;
          document.head.appendChild(s);
        }
      }
    </script>
    <!-- OpenGraph Virality Meta Tags -->
    <meta property="og:title" content="CivicFlow: AI Election Navigator">
    <meta property="og:description" content="Check eligibility, find your polling booth, and know your representatives in seconds.">
    <meta property="og:image" content="https://storage.googleapis.com/antigravity-assets/civicflow-og.png">
    <meta property="og:url" content="https://civicflow.in">
    <meta property="og:type" content="website">
    <!-- HTMX for AJAX -->
    <script src="/js/htmx.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    <script>
        const dict = {
            en: {
                lang: "Lang:", login: "Log In", logout: "Logout",
                placeholder: "Ask about eligibility...",
                synthesizing: "Analyzing civic data...", acquiring: "Acquiring GPS Signal...",
                check: "Check Eligibility", find: "Find Polling Booth", know: "Know Your Rep",
                results: "2024 Results",
                welcome: "Namaskar! I'm your CivicFlow Navigator. I can help you check your voting eligibility, find your polling booth, or know your representative. What would you like to do?",
                share: "Share CivicFlow", shareCopied: "Link copied!",
                noNotifs: "No notifications", markRead: "Mark read",
                loginTitle: "Login", registerTitle: "Register",
                emailLabel: "Email", passwordLabel: "Password",
                needAccount: "Need an account? Register", haveAccount: "Have an account? Login",
                settingsTitle: "Settings", epicLabel: "EPIC Number",
                stateLabel: "State", constituencyLabel: "Constituency",
                langPrefLabel: "Preferred Language", cancelBtn: "Cancel", saveBtn: "Save",
                networkFail: "Network Failure",
                networkMsg: "Cannot connect to CivicFlow servers. Please check your connection.",
                locationDenied: "Location Access Denied or Timeout",
                locationMsg: "Unable to retrieve coordinates. Please enable site permissions."
            },
            hi: {
                lang: "भाषा:", login: "लॉग इन", logout: "लॉग आउट",
                placeholder: "पात्रता के बारे में पूछें...",
                synthesizing: "नागरिक डेटा का विश्लेषण कर रहा है...", acquiring: "जीपीएस सिग्नल प्राप्त कर रहा है...",
                check: "पात्रता जाँचें", find: "मतदान केंद्र खोजें", know: "अपने प्रतिनिधि को जानें",
                results: "2024 परिणाम",
                welcome: "नमस्कार! मैं आपका सिविकफ्लो नेविगेटर हूँ। मैं आपको मतदान पात्रता जांचने, मतदान केंद्र ढूंढने, या प्रतिनिधि जानने में मदद कर सकता हूँ।",
                share: "शेयर करें", shareCopied: "लिंक कॉपी हो गया!",
                noNotifs: "कोई सूचना नहीं", markRead: "पढ़ा हुआ चिह्नित करें",
                loginTitle: "लॉग इन", registerTitle: "पंजीकरण",
                emailLabel: "ईमेल", passwordLabel: "पासवर्ड",
                needAccount: "खाता नहीं है? पंजीकरण करें", haveAccount: "खाता है? लॉग इन करें",
                settingsTitle: "सेटिंग्स", epicLabel: "EPIC नंबर",
                stateLabel: "राज्य", constituencyLabel: "निर्वाचन क्षेत्र",
                langPrefLabel: "पसंदीदा भाषा", cancelBtn: "रद्द करें", saveBtn: "सहेजें",
                networkFail: "नेटवर्क विफलता",
                networkMsg: "CivicFlow सर्वर से कनेक्ट नहीं हो सका। कृपया अपना कनेक्शन जांचें।",
                locationDenied: "स्थान पहुँच अस्वीकृत",
                locationMsg: "निर्देशांक प्राप्त नहीं हो सके। कृपया साइट अनुमतियाँ सक्षम करें।"
            }
        };

        document.addEventListener('alpine:init', () => {
            Alpine.store('app', {
                locale: localStorage.getItem('locale') || 'en',
                setLocale(lang) {
                    this.locale = lang;
                    localStorage.setItem('locale', lang);
                    document.documentElement.lang = lang;
                },
                csrfToken: '',
                t(key) {
                    return dict[this.locale]?.[key] || key;
                }
            });

            // Sync locale with HTML element initially
            document.documentElement.lang = Alpine.store('app').locale;

            // Fetch CSRF token once initialized
            fetch('/api/csrf', { headers: { 'CSRF-Token': '' } }).then(r => r.json()).then(data => {
                Alpine.store('app').csrfToken = data.csrfToken;
                document.body.addEventListener('htmx:configRequest', (event) => {
                    event.detail.headers['CSRF-Token'] = data.csrfToken;
                });
            });
        });
    </script>
    <script defer src="/js/alpine.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-[#F8F7F3] text-[#1A1A1A] font-sans antialiased flex flex-col items-center justify-center min-h-screen">

<main x-data="{ status: 0 }" class="w-full max-w-4xl h-screen sm:h-[calc(100vh-2rem)] sm:my-4 flex flex-col bg-white sm:border-8 border-[#1A1A1A] shadow-[8px_8px_0px_#1A1A1A] overflow-hidden relative">

    <!-- Header -->
    <header class="h-20 border-b-2 border-[#1A1A1A] flex items-center px-4 sm:px-8 justify-between bg-white shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF9933] flex items-center justify-center font-bold text-white text-xl border-2 border-[#1A1A1A] shadow-[2px_2px_0px_#1A1A1A]">CF</div>
            <h1 class="text-xl sm:text-2xl font-black tracking-tighter uppercase italic">CivicFlow</h1>
        </div>
         <div class="flex items-center gap-4 sm:gap-6">
             <div class="hidden sm:flex items-center gap-2">
                 <label for="locale" class="text-xs font-bold uppercase" x-text="$store.app.t('lang')">Lang:</label>
                 <select id="locale" name="locale" :value="$store.app.locale" @change="$store.app.setLocale($event.target.value)" class="border-2 border-[#1A1A1A] p-1 text-xs font-bold uppercase focus:outline-none">
                     <option value="en">ENG</option>
                     <option value="hi">HIN</option>
                 </select>
             </div>
             <!-- Web Share API -->
             <button x-data @click="if(navigator.share){navigator.share({title:'CivicFlow',text:'AI Indian Election Navigator',url:location.href})}else{navigator.clipboard.writeText(location.href);alert($store.app.t('shareCopied'))}" :title="$store.app.t('share')" class="hidden sm:flex w-9 h-9 items-center justify-center border-2 border-[#1A1A1A] hover:bg-[#FF9933] hover:text-white transition-colors bg-[#F8F7F3] shadow-[2px_2px_0px_#1A1A1A]" aria-label="Share">
                 <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
             </button>
             <div class="w-px h-8 bg-[#1A1A1A] opacity-20 hidden sm:block"></div>
             <div x-data="{ user: null, open: false, showSettings: false, notifs: [], showNotifs: false }" 
                  x-init="fetch('/api/auth/me').then(r=>r.json()).then(d=>{if(d.success) document.dispatchEvent(new CustomEvent('auth-changed', {detail: d.user}))})"
                  @auth-changed.window="user = $event.detail; status = 1; if(user) { fetch('/api/notifications', {headers: {'CSRF-Token': $store.app.csrfToken}}).then(r => r.json()).then(d => { if(d.success) notifs = d.notifications; }) }" class="relative flex items-center gap-2">
                 <template x-if="user">
                     <div class="flex items-center gap-2">
                         <div class="relative">
                              <button @click="showNotifs = !showNotifs" class="w-10 h-10 bg-white border-2 border-[#1A1A1A] flex items-center justify-center text-[#1A1A1A] shadow-[2px_2px_0px_#1A1A1A] relative" aria-label="Notifications">
                                   <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                                   <template x-if="notifs.filter(n => !n.is_read).length > 0">
                                        <span class="absolute -top-1 -right-1 w-3 h-3 bg-[#ea4335] rounded-full animate-bounce border border-white"></span>
                                   </template>
                              </button>
                              <div x-show="showNotifs" x-cloak @click.away="showNotifs = false" class="absolute right-0 mt-2 w-64 bg-white border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] max-h-64 overflow-y-auto z-50">
                                   <template x-if="notifs.length === 0">
                                       <div class="p-3 text-xs text-center" x-text="$store.app.t('noNotifs')"></div>
                                   </template>
                                   <template x-for="notif in notifs" :key="notif.id">
                                        <div class="p-3 border-b border-[#1A1A1A] text-xs" :class="notif.is_read ? 'opacity-50' : 'bg-[#F8F7F3] font-bold'">
                                             <div x-text="notif.message"></div>
                                             <button @click="fetch('/api/notifications/read', {method:'POST', headers:{'Content-Type':'application/json', 'CSRF-Token': $store.app.csrfToken}, body: JSON.stringify({notification_id: notif.id})}).then(() => notif.is_read = true)" x-show="!notif.is_read" class="mt-2 text-[10px] text-[#FF9933] underline" x-text="$store.app.t('markRead')"></button>
                                        </div>
                                   </template>
                              </div>
                         </div>
                         <div class="relative flex items-center gap-2">
                             <div class="text-[10px] font-bold uppercase tracking-widest text-[#1A1A1A] bg-[#FF9933] px-2 py-1 shadow-[2px_2px_0px_#1A1A1A] border-2 border-[#1A1A1A]">
                                 <span x-text="user.credits || 0"></span> CREDITS
                             </div>
                             <button @click="open = !open" class="w-10 h-10 bg-[#1A1A1A] border-2 border-[#1A1A1A] flex items-center justify-center text-sm font-bold text-white shadow-[2px_2px_0px_#FF9933] cursor-pointer" x-text="user.email.charAt(0).toUpperCase()"></button>
                             <div x-show="open" x-cloak @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] p-2 z-50 flex flex-col gap-2 top-10">
                                 <div class="text-xs opacity-70 p-2 truncate" x-text="user.email"></div>
                                 <button @click="showSettings = true; open = false;" class="w-full text-left px-2 py-2 text-xs font-bold uppercase hover:bg-[#F0F0F0] text-[#1A1A1A] transition-colors border-t border-[#1A1A1A]">Settings</button>
                                 <template x-if="user.role === 'admin'">
                                      <button @click="document.dispatchEvent(new CustomEvent('open-admin-logs')); open = false;" class="w-full text-left px-2 py-2 text-xs font-bold uppercase hover:bg-[#F0F0F0] text-[#1A1A1A] transition-colors border-t border-[#1A1A1A] flex items-center justify-between">
                                          System Logs
                                          <span class="w-2 h-2 rounded-full bg-[#ea4335] animate-pulse"></span>
                                      </button>
                                 </template>
                                 <button @click="open = false; fetch('/api/auth/logout', {method: 'POST', headers: { 'CSRF-Token': $store.app.csrfToken }}).then(r => { if(r.ok) { user = null; document.dispatchEvent(new CustomEvent('auth-changed', {detail: null})); } })" class="w-full text-left px-2 py-2 text-xs font-bold uppercase hover:bg-[#F0F0F0] text-[#1A1A1A] hover:text-[#ea4335] transition-colors border-t border-[#1A1A1A]" x-text="$store.app.t('logout')">Logout</button>
                             </div>
                         </div>
                         
                         <!-- Settings Modal -->
                         <div x-show="showSettings" x-cloak class="fixed inset-0 bg-black/50 z-[200] flex justify-center items-center">
                             <div @click.away="showSettings = false" class="bg-white border-2 border-[#1A1A1A] shadow-[8px_8px_0px_#1A1A1A] p-6 w-96 max-w-[90vw]" x-data="{ formData: {epic_number: '', state: '', constituency: '', language_preference: 'en'} }" x-init="$watch('showSettings', v => { if(v) fetch('/api/settings',{headers: {'CSRF-Token': $store.app.csrfToken}}).then(r=>r.json()).then(d => {if(d.success) formData = d.settings || formData}) })">
                                  <h2 class="text-[#1A1A1A] uppercase tracking-widest font-black text-xl border-b-2 border-[#1A1A1A] pb-2 mb-4" x-text="$store.app.t('settingsTitle')"></h2>
                                  <div class="space-y-4">
                                      <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('epicLabel')"></label><input type="text" x-model="formData.epic_number" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"></div>
                                      <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('stateLabel')"></label><input type="text" x-model="formData.state" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"></div>
                                      <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('constituencyLabel')"></label><input type="text" x-model="formData.constituency" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"></div>
                                      <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('langPrefLabel')"></label><select x-model="formData.language_preference" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"><option value="en">English</option><option value="hi">Hindi</option></select></div>
                                      <div class="flex gap-2 pt-2">
                                          <button @click="showSettings = false" class="flex-1 py-2 text-xs font-bold uppercase border-2 border-[#1A1A1A] hover:bg-[#F0F0F0]" x-text="$store.app.t('cancelBtn')"></button>
                                          <button @click="fetch('/api/settings', {method:'POST', headers:{'Content-Type':'application/json','CSRF-Token': $store.app.csrfToken}, body: JSON.stringify(formData)}).then(()=>{showSettings = false; $store.app.locale = formData.language_preference;})" class="flex-1 py-2 bg-[#FF9933] text-white border-2 border-[#1A1A1A] text-xs font-bold uppercase shadow-[2px_2px_0px_#1A1A1A] hover:shadow-none hover:translate-y-[2px]" x-text="$store.app.t('saveBtn')"></button>
                                      </div>
                                  </div>
                             </div>
                         </div>
                     </div>
                 </template>
                 <template x-if="!user">
                    <div class="flex gap-2" x-data="{ showAuth: false, isLogin: true, email: '', password: '', error: '' }">
                        <button type="button" @click="showAuth = true; isLogin = true" class="px-4 sm:px-6 py-2 bg-[#1A1A1A] text-white text-[10px] sm:text-xs font-bold uppercase tracking-widest hover:bg-[#FF9933] transition-colors border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] active:translate-y-[4px] active:shadow-none transition-all" x-text="$store.app.t('login')">Log In</button>
                        
                        <!-- Auth Modal -->
                        <div x-show="showAuth" x-cloak class="fixed inset-0 bg-black/50 z-[200] flex justify-center items-center">
                            <div @click.away="showAuth = false" class="bg-white border-2 border-[#1A1A1A] shadow-[8px_8px_0px_#1A1A1A] p-6 w-96 max-w-[90vw]">
                                <div class="flex justify-between items-center border-b-2 border-[#1A1A1A] pb-2 mb-4">
                                    <h2 class="text-[#1A1A1A] uppercase tracking-widest font-black text-xl" x-text="isLogin ? $store.app.t('loginTitle') : $store.app.t('registerTitle')"></h2>
                                    <button @click="showAuth = false" class="text-xs font-bold">✕</button>
                                </div>
                                <div class="space-y-4">
                                    <div x-show="error" class="text-[#ea4335] text-xs font-bold bg-[#ea4335]/10 p-2" x-text="error"></div>
                                    <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('emailLabel')"></label><input type="email" x-model="email" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"></div>
                                    <div><label class="text-[10px] uppercase font-bold tracking-widest block mb-1" x-text="$store.app.t('passwordLabel')"></label><input type="password" x-model="password" class="w-full border-2 border-[#1A1A1A] px-2 py-1 text-sm bg-[#F8F7F3] focus:bg-white focus:outline-none shadow-[2px_2px_0px_#1A1A1A]"></div>
                                    <button @click="fetch(isLogin ? '/api/login' : '/api/register', {method: 'POST', headers: {'Content-Type': 'application/json', 'CSRF-Token': $store.app.csrfToken}, body: JSON.stringify({email, password})}).then(r => r.json()).then(d => { if(d.success) { showAuth = false; document.dispatchEvent(new CustomEvent('auth-changed', {detail: d})); } else { error = d.message; }})" class="w-full py-2 bg-[#FF9933] text-white border-2 border-[#1A1A1A] text-xs font-bold uppercase shadow-[2px_2px_0px_#1A1A1A] hover:shadow-none hover:translate-y-[2px]" x-text="isLogin ? $store.app.t('loginTitle') : $store.app.t('registerTitle')"></button>
                                    <div class="text-center mt-2">
                                        <button @click="isLogin = !isLogin; error = ''" class="text-[10px] text-[#1A1A1A] underline" x-text="isLogin ? $store.app.t('needAccount') : $store.app.t('haveAccount')"></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                 </template>
             </div>
         </div>
    </header>

    <div class="flex-1 flex overflow-hidden w-full lg:w-3/4 mx-auto">
        <div class="flex-1 flex flex-col h-full bg-white relative border-l-2 border-r-2 border-[#1A1A1A]">
            <!-- Chat Interface -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6" aria-live="polite">
                <!-- Initial Welcome Message -->
                <div class="flex gap-4">
                    <div class="w-8 h-8 bg-[#1A1A1A] text-white flex items-center justify-center text-xs font-bold shrink-0 border border-[#1A1A1A]">AI</div>
                    <div class="p-4 bg-[#F0F0F0] text-[#1A1A1A] text-sm leading-relaxed max-w-[85%] sm:max-w-[80%] border border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A]" x-text="$store.app.t('welcome')">
                        Namaskar! I'm your CivicFlow Navigator. I can help you check your voting eligibility, find your polling booth, or know your representative. What would you like to do?
                    </div>
                </div>
            </div>
            <!-- Civic Data Attribution -->
            <div class="px-4 sm:px-8 py-1 text-center">
                <p class="text-[9px] opacity-40 uppercase tracking-widest font-bold">Data sourced from Election Commission of India &amp; Google Civic API · Powered by Gemini AI</p>
            </div>

            <!-- Loading Indicator with Gemini Sparkle and Civic Pulse Skeleton -->
            <div id="loading-indicator" class="htmx-indicator absolute bottom-[180px] left-4 sm:left-8 flex gap-4 w-[80%] z-20" aria-live="polite">
                <!-- Gemini Sparkle Core -->
                <div class="w-12 h-12 rounded-xl gemini-sparkle flex items-center justify-center shrink-0 border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A]">
                    <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                
                <!-- Civic Pulse Skeleton -->
                <div class="flex-1 bg-white p-3 border-2 border-[#1A1A1A] shadow-[4px_4px_0px_#1A1A1A] flex flex-col justify-center gap-2">
                    <span class="uppercase tracking-widest font-bold text-[9px] text-[#4285f4]" x-text="$store.app.t('synthesizing')">Analyzing civic data...</span>
                    <div class="w-full h-3 rounded-sm civic-skeleton border border-gray-200"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 sm:p-6 bg-white border-t-2 border-[#1A1A1A] z-10 shrink-0">
                <form id="chat-form" x-ref="chatForm" hx-post="/api/chat" hx-target="#chat-container" hx-swap="beforeend" hx-indicator="#loading-indicator" hx-on::before-request="isPending = true" hx-on::after-request="isPending = false; message = ''; $refs.chatInput.focus();" class="flex items-center gap-2 sm:gap-3" x-data="{ message: '', isPending: false }" @submit="if(!message.trim()) { $event.preventDefault(); return; }" @gps-start.window="isPending = true" @gps-end.window="isPending = false" @trigger-chat.window="message = $event.detail; setTimeout(() => htmx.trigger($el, 'submit'), 50);">
                     <input type="hidden" name="lang" :value="$store.app.locale">
                     <button type="button" @click="$dispatch('request-location')" :disabled="isPending" class="w-12 h-12 flex items-center justify-center border-2 border-[#1A1A1A] text-[#1A1A1A] hover:bg-[#FF9933] hover:text-white transition-colors bg-[#F8F7F3] shadow-[4px_4px_0px_#1A1A1A] disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] shrink-0 active:translate-y-[4px] active:shadow-none transition-all hidden sm:flex" aria-label="Share Location">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <div class="relative flex-1">
                        <input autofocus x-ref="chatInput" id="chat-input-field" type="text" name="message" x-model="message" required maxlength="500" :readonly="isPending" class="w-full bg-white border-2 border-[#1A1A1A] px-4 py-3 text-sm focus:outline-none focus:bg-[#F8F7F3] disabled:opacity-50 transition shadow-[4px_4px_0px_#1A1A1A] rounded-none italic placeholder:not-italic" :placeholder="$store.app.t('placeholder')" autocomplete="off">
                        <span class="absolute right-2 bottom-1 text-[10px] text-gray-500 font-mono" x-text="`${message.length}/500`"></span>
                    </div>

                    <button type="submit" class="w-12 h-12 bg-[#1A1A1A] text-white flex items-center justify-center border-2 border-[#1A1A1A] hover:bg-[#FF9933] transition-colors shadow-[4px_4px_0px_rgba(26,26,26,0.2)] hover:shadow-[2px_2px_0px_#1A1A1A] hover:translate-y-[2px] shrink-0 disabled:opacity-50 disabled:cursor-not-allowed active:translate-y-[4px] active:shadow-none transition-all" :disabled="!message.trim() || isPending" aria-label="Send Message">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>

                </form>
            <!-- Suggestion Chips -->
            <div class="flex flex-wrap gap-x-2 gap-y-2 mt-4 sm:mt-6" x-data>
                <button @click="$dispatch('trigger-chat', 'Am I eligible to vote?')" class="m3-button" x-text="$store.app.t('check')">Check Eligibility</button>
                <button @click="$dispatch('trigger-chat', 'Find my polling booth')" class="m3-button-primary" x-text="$store.app.t('find')">Find Polling Booth</button>
                <button @click="$dispatch('trigger-chat', 'KNOW_REP')" class="m3-button-secondary" x-text="$store.app.t('know')">Know Your Rep</button>
                <button @click="$dispatch('trigger-chat', 'Show me 2024 Lok Sabha election results')" class="m3-button" x-text="$store.app.t('results')">2024 Results</button>
            </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.body.addEventListener('htmx:sendError', function(evt) {
        document.dispatchEvent(new CustomEvent('chat-error'));
        const chatBox = document.getElementById('chat-container');
        if (chatBox) {
            const _t = (k) => Alpine.store('app').t(k);
        chatBox.insertAdjacentHTML('beforeend', `<div class="spring-m3 flex gap-4 mb-6 relative chat-bubble-enter show"><div class="w-8 h-8 bg-[#ea4335] text-white flex items-center justify-center text-xs font-bold shrink-0 border border-[#1A1A1A]">ERR</div><div class="p-4 bg-[#F8F7F3] text-[#ea4335] text-sm leading-relaxed max-w-[85%] sm:max-w-[80%] border border-[#ea4335] shadow-[4px_4px_0px_#ea4335] flex flex-col gap-2"><p class="font-bold uppercase tracking-widest text-xs mb-2 text-[#1A1A1A]">${_t('networkFail')}</p><p>${_t('networkMsg')}</p></div></div>`);
            setTimeout(() => {
                const newBubble = chatBox.querySelector('.chat-bubble-enter.show');
                if (newBubble) newBubble.classList.add('chat-bubble-entered');
            }, 50);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    document.body.addEventListener('htmx:responseError', function(evt) {
        document.dispatchEvent(new CustomEvent('chat-error'));
    });

    // Location handling for Alpine
    document.addEventListener('request-location', () => {
         if ("geolocation" in navigator) {
             document.dispatchEvent(new CustomEvent('gps-start'));
            const chatBox = document.getElementById('chat-container');
            const acquiringText = Alpine.store('app').t('acquiring');
            chatBox.insertAdjacentHTML('beforeend', `<div id="acquire-loader" class="text-center text-xs font-bold uppercase tracking-widest text-[#1A1A1A] my-4 py-3 px-6 border-2 border-[#1A1A1A] bg-white shadow-[4px_4px_0px_#FF9933] block w-[fit-content] mx-auto mt-6 mb-2 flex items-center gap-3"><svg class="w-4 h-4 animate-[spin_2s_linear_infinite] text-[#FF9933]" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span>${acquiringText}</span></div>`);
            
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const locale = Alpine.store('app').locale;
                const key = localStorage.getItem('gemini_api_key') || '';
                
                htmx.ajax('POST', '/api/chat', {
                    values: { message: `FIND_BOOTH_LOCATION|${lat}|${lng}`, lang: locale, apiKey: key },
                    target: '#chat-container',
                    swap: 'beforeend'
                }).then(() => {
                    document.getElementById('acquire-loader')?.remove();
                    document.dispatchEvent(new CustomEvent('gps-end'));
                });

            }, (error) => {
                 document.getElementById('acquire-loader')?.remove();
                 const _tl = (k) => Alpine.store('app').t(k);
                 chatBox.insertAdjacentHTML('beforeend', `
                    <div x-data="{ show: false }" x-init="setTimeout(() => show = true, 50)" :class="show ? 'chat-bubble-entered' : 'chat-bubble-enter'" class="spring-m3 flex gap-4 mb-6 relative">
                        <div class="w-8 h-8 bg-[#ea4335] text-white flex items-center justify-center text-xs font-bold shrink-0 border border-[#1A1A1A]">ERR</div>
                        <div class="p-4 bg-[#F8F7F3] text-[#ea4335] text-sm leading-relaxed max-w-[85%] sm:max-w-[80%] border border-[#ea4335] shadow-[4px_4px_0px_#ea4335] flex flex-col gap-2">
                             <p class="font-bold uppercase tracking-widest text-xs mb-2 text-[#1A1A1A]">${_tl('locationDenied')}</p>
                             <p>${_tl('locationMsg')}</p>
                        </div>
                    </div>
                `);
                 document.dispatchEvent(new CustomEvent('gps-end'));
            }, { timeout: 10000 });
        } else {
             document.dispatchEvent(new CustomEvent('gps-end'));
        }
    });

    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        if (evt.detail.xhr.status >= 400 && evt.detail.xhr.status < 600) {
            evt.detail.shouldSwap = true;
            evt.detail.isError = false;
        }
    });

    // Handle HTMX successful swap and clear message
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if(evt.detail.target.id === 'chat-container') {
             if (evt.detail.xhr.status >= 400) {
                 document.dispatchEvent(new CustomEvent('chat-error'));
             } else if (evt.detail.successful) {
                 document.dispatchEvent(new CustomEvent('chat-success'));
             } else {
                 document.dispatchEvent(new CustomEvent('chat-error'));
             }
        }
    });

    <!-- Use MutationObserver for auto-scrolling reliably without setTimeout -->
    const chatContainer = document.getElementById('chat-container');
    if (chatContainer) {
        const observer = new MutationObserver(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
        observer.observe(chatContainer, { childList: true });
    }
</script>

    <!-- Admin Log Panel -->
    <div x-data="{ showAdminLogs: false }" 
         x-show="showAdminLogs" x-cloak 
         @open-admin-logs.window="showAdminLogs = true; htmx.ajax('GET', '/api/admin/logs', { target: '#admin-panel' })"
         @auth-changed.window="if(!$event.detail || $event.detail.role !== 'admin') showAdminLogs = false"
         class="fixed inset-0 z-[100] flex justify-end bg-black bg-opacity-50 transition-opacity"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
         <div class="w-full md:w-3/4 lg:w-1/2 h-full bg-[#F8F7F3] border-l-4 border-[#1A1A1A] shadow-[-10px_0px_0px_rgba(26,26,26,0.1)] flex flex-col transform transition-transform"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="translate-x-full"
              x-transition:enter-end="translate-x-0"
              x-transition:leave="transition ease-in duration-200"
              x-transition:leave-start="translate-x-0"
              x-transition:leave-end="translate-x-full">
              <div id="admin-panel" class="w-full h-full flex flex-col">
                  <!-- HTMX logs target -->
              </div>
         </div>
    </div>

</body>
</html>
